name: Security Scan

on:

  push:
    branches:
      - main

  pull_request:


jobs:

  scan:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master

        with:

          scan-type: fs

          severity: HIGH,CRITICAL

          ignore-unfixed: true

          exit-code: 0