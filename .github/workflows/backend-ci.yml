name: Backend CI


on:

  push:
    branches:
      - main

  pull_request:



jobs:

  build:


    runs-on: ubuntu-latest



    defaults:

      run:

        working-directory: TLP-rfid/backend



    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Set up JDK 17
        uses: actions/setup-java@v4

        with:

          distribution: temurin

          java-version: 17

          cache: maven



      - name: Cache Maven repository
        uses: actions/cache@v4

        with:

          path: ~/.m2/repository

          key: maven-${{ hashFiles('TLP-rfid/backend/pom.xml') }}

          restore-keys: |
            maven-



      - name: Resolve Maven dependencies
        run: mvn dependency:resolve



      - name: Build with Maven
        run: mvn clean install -DskipTests=false



      - name: Run tests
        run: mvn test



      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check



      - name: Show Dependency Report
        if: always()

        run: |

          ls -la target

          ls -la target/dependency-check-report.html || true