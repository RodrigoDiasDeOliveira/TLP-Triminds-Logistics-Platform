server:
  port: 8080

spring:
  application:
    name: tlp-rfid
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate.format_sql: true

jwt:
  secret: ${JWT_SECRET:MinhaChaveSuperSecretaTrocarEmProd0123456789}
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.triminds.tlp: DEBUG
    org.springframework.security: INFO
