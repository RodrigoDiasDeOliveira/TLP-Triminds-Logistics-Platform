name: Backend CI

on:
  push:
    branches: ["main"]

  pull_request:


jobs:

  build:

    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: TLP-rfid/backend


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven



      - name: Compile
        run: mvn clean compile



      - name: Run tests
        run: mvn test



      - name: Package
        run: mvn package -DskipTests



      - name: Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
